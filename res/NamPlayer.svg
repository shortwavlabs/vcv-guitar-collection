<?xml version="1.0" encoding="UTF-8"?>
<svg width="315" height="380" viewBox="0 0 315 380" xmlns="http://www.w3.org/2000/svg">
  <!-- NAM Player Panel - 21HP (106.68mm = 315px at 75px/mm) -->
  
  <!-- Background -->
  <rect x="0" y="0" width="315" height="380" fill="#2a2a2a"/>
  
  <!-- Top border gradient effect -->
  <rect x="0" y="0" width="315" height="4" fill="#444"/>
  <rect x="0" y="376" width="315" height="4" fill="#111"/>
  
  <!-- Module Title -->
  <text x="157.5" y="32" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">NAM PLAYER</text>
  <text x="157.5" y="46" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#888888" text-anchor="middle">Neural Amp Modeler</text>
  
  <!-- Status Lights Labels -->
  <text x="133" y="65" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">MODEL</text>
  <text x="157" y="65" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">SR</text>
  <text x="181" y="65" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">GATE</text>
  
  <!-- INPUT Section -->
  <text x="44" y="80" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">INPUT</text>
  
  <!-- OUTPUT Section -->
  <text x="271" y="80" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">OUTPUT</text>
  
  <!-- GATE Section -->
  <rect x="20" y="138" width="275" height="1" fill="#444"/>
  <text x="157.5" y="155" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#aaaaaa" text-anchor="middle">NOISE GATE</text>
  
  <!-- Gate Knob Labels -->
  <text x="44" y="185" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">THRESH</text>
  <text x="101" y="185" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">ATK</text>
  <text x="157" y="185" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">REL</text>
  <text x="214" y="185" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">HOLD</text>
  
  <!-- TONE Section -->
  <rect x="20" y="195" width="275" height="1" fill="#444"/>
  <text x="157.5" y="212" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" fill="#aaaaaa" text-anchor="middle">TONE STACK</text>
  
  <!-- Tone Stack Knob Labels -->
  <text x="44" y="242" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">BASS</text>
  <text x="101" y="242" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">MID</text>
  <text x="157" y="242" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">TREB</text>
  <text x="214" y="242" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">PRES</text>
  <text x="271" y="242" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#888888" text-anchor="middle">DEPTH</text>
  
  <!-- I/O Section -->
  <rect x="20" y="278" width="275" height="1" fill="#444"/>
  
  <!-- Port Labels -->
  <text x="44" y="310" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#888888" text-anchor="middle">IN</text>
  <text x="271" y="310" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#888888" text-anchor="middle">OUT</text>
  
  <!-- Brand -->
  <text x="157.5" y="365" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#666666" text-anchor="middle">SHORTWAV LABS</text>
</svg>
