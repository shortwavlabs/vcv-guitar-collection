name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.platform_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_name: lin-x64
            sdk_url: https://vcvrack.com/downloads/Rack-SDK-latest-lin-x64.zip
          - os: windows-latest
            platform_name: win-x64
            sdk_url: https://vcvrack.com/downloads/Rack-SDK-latest-win-x64.zip
          - os: macos-14
            platform_name: mac-arm64
            sdk_url: https://vcvrack.com/downloads/Rack-SDK-latest-mac-arm64.zip

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ------------------------------------------------------------------------
      # Setup Dependencies (Linux)
      # ------------------------------------------------------------------------
      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev jq zstd

      # ------------------------------------------------------------------------
      # Setup Dependencies (Mac)
      # ------------------------------------------------------------------------
      - name: Install Dependencies (Mac)
        if: runner.os == 'macOS'
        run: |
          brew install jq zstd

      # ------------------------------------------------------------------------
      # Setup Dependencies (Windows)
      # ------------------------------------------------------------------------
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            unzip
            zip
            jq
            zstd
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-zstd

      # ------------------------------------------------------------------------
      # Download and Setup SDK
      # ------------------------------------------------------------------------
      - name: Setup Rack SDK
        shell: bash
        run: |
          echo "Downloading SDK from ${{ matrix.sdk_url }}"
          curl -L -o Rack-SDK.zip "${{ matrix.sdk_url }}"
          unzip -q Rack-SDK.zip
          # SDK unzips to a folder like "Rack-SDK". Move it to dep/Rack-SDK where tests expect it
          if [ -d "Rack-SDK" ]; then
            mv "Rack-SDK" dep/Rack-SDK
          else
            # Find the directory it unzipped to (e.g. Rack-SDK-2.x.x)
            SDK_DIR=$(ls -d Rack-SDK* | head -n 1)
            mv "$SDK_DIR" dep/Rack-SDK
          fi
          echo "RACK_DIR=$(pwd)/dep/Rack-SDK" >> $GITHUB_ENV
          
      # ------------------------------------------------------------------------
      # Download Rack Runtime (Windows only - for tests)
      # ------------------------------------------------------------------------
      - name: Download Rack Runtime (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "Downloading VCV Rack for Windows to get runtime DLL..."
          curl -L -o Rack-win.zip "https://vcvrack.com/downloads/Rack-latest-win-x64.zip"
          unzip -q Rack-win.zip
          # Find and copy Rack.dll to SDK location for tests
          find . -maxdepth 3 -name "Rack.dll" -exec cp {} dep/Rack-SDK/ \;
          echo "Rack.dll location:"
          find dep/Rack-SDK -name "Rack.dll"

      # ------------------------------------------------------------------------
      # Run Tests
      # ------------------------------------------------------------------------
      - name: Run Tests
        shell: bash
        run: |
          chmod +x ./run_tests.sh
          ./run_tests.sh

      # ------------------------------------------------------------------------
      # Build Plugin (Linux/Mac)
      # ------------------------------------------------------------------------
      - name: Build Plugin (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          make dep
          make dist

      # ------------------------------------------------------------------------
      # Build Plugin (Windows)
      # ------------------------------------------------------------------------
      - name: Build Plugin (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          # Set RACK_DIR using MSYS2 path format
          export RACK_DIR="$(cygpath -u "$GITHUB_WORKSPACE")/dep/Rack-SDK"
          echo "RACK_DIR=$RACK_DIR"
          make dep
          make dist

      # ------------------------------------------------------------------------
      # Upload Artifacts
      # ------------------------------------------------------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: guitar-collection-plugin-${{ matrix.platform_name }}
          path: dist/*.vcvplugin
