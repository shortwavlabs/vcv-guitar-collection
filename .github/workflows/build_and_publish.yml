name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build with rack-plugin-toolchain v2
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # ------------------------------------------------------------------------
      # Setup Dependencies
      # ------------------------------------------------------------------------
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zstd

      # ------------------------------------------------------------------------
      # Checkout rack-plugin-toolchain
      # ------------------------------------------------------------------------
      - name: Checkout rack-plugin-toolchain (v2)
        uses: actions/checkout@v4
        with:
          repository: shortwavlabs/rack-plugin-toolchain
          ref: v2
          path: rack-plugin-toolchain

      # ------------------------------------------------------------------------
      # Download Rack SDK for tests
      # ------------------------------------------------------------------------
      - name: Setup Rack SDK (test runtime)
        run: |
          echo "Downloading Rack SDK for tests"
          curl -L -o Rack-SDK.zip "https://vcvrack.com/downloads/Rack-SDK-latest-lin-x64.zip"
          unzip -q Rack-SDK.zip
          if [ -d "Rack-SDK" ]; then
            mv "Rack-SDK" dep/Rack-SDK
          else
            SDK_DIR=$(ls -d Rack-SDK* | head -n 1)
            mv "$SDK_DIR" dep/Rack-SDK
          fi
          echo "RACK_DIR=$(pwd)/dep/Rack-SDK" >> $GITHUB_ENV

      # ------------------------------------------------------------------------
      # Run Tests
      # ------------------------------------------------------------------------
      - name: Run Tests (with coverage reporting)
        shell: bash
        run: |
          chmod +x ./run_tests_with_coverage.sh
          ./run_tests_with_coverage.sh

      # ------------------------------------------------------------------------
      # Download macOS SDK tarball for toolchain build
      # ------------------------------------------------------------------------
      - name: Download macOS SDK 12.3 archive
        env:
          MACOS_SDK_12_3_URL: ${{ secrets.MACOS_SDK_12_3_URL }}
        run: |
          if [ -z "$MACOS_SDK_12_3_URL" ]; then
            echo "Missing required secret: MACOS_SDK_12_3_URL"
            echo "Set this to a downloadable URL for MacOSX12.3.sdk.tar.xz"
            exit 1
          fi
          curl -L "$MACOS_SDK_12_3_URL" -o rack-plugin-toolchain/MacOSX12.3.sdk.tar.xz

      # ------------------------------------------------------------------------
      # Build Plugin with rack-plugin-toolchain v2
      # ------------------------------------------------------------------------
      - name: Build Plugin
        run: |
          make -C rack-plugin-toolchain JOBS="$(nproc)" docker-build
          make -C rack-plugin-toolchain -j"$(nproc)" docker-plugin-build PLUGIN_DIR="$GITHUB_WORKSPACE"

      # ------------------------------------------------------------------------
      # Upload Artifacts
      # ------------------------------------------------------------------------
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: guitar-collection-plugin-all-platforms
          path: rack-plugin-toolchain/plugin-build/*.vcvplugin
